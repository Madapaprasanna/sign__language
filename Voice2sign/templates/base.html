{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Sign Language Assistant</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #00f5d4;
        --secondary: #00d2ff;
        --accent: #1e1e2f;
        --bg: #0f0f1a;
        --glass: rgba(255, 255, 255, 0.03);
        --blur: 16px;
        --card-bg: rgba(255, 255, 255, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--bg);
        background-image:
          radial-gradient(
            circle at 10% 20%,
            rgba(0, 245, 212, 0.05) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(0, 210, 255, 0.05) 0%,
            transparent 40%
          );
        color: #fff;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        backdrop-filter: blur(var(--blur));
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 1rem 4rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(15, 15, 26, 0.8);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        text-decoration: none;
      }

      .logo-icon {
        font-size: 1.8rem;
        color: var(--primary);
        text-shadow: 0 0 15px rgba(0, 245, 212, 0.4);
      }

      .logo-text {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: #fff;
      }

      .nav-links {
        display: flex;
        gap: 1.5rem;
      }

      .nav-links a {
        color: #aaa;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        padding: 0.6rem 1.2rem;
        border-radius: 10px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary);
        background: var(--glass);
      }

      .container {
        flex: 1;
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        padding: 2rem 4rem;
      }

      footer {
        text-align: center;
        padding: 2rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        color: #666;
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        header {
          padding: 1rem 2rem;
          flex-direction: column;
          gap: 1rem;
        }
        .container {
          padding: 1rem 2rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="{% url 'home' %}" class="logo">
        <div class="logo-icon"><i class="fas fa-brain"></i></div>
        <div class="logo-text">SignAssistant</div>
      </a>

      <nav class="nav-links">
        <a href="{% url 'home' %}"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="{% url 'animation' %}"
          ><i class="fas fa-magic"></i> Text to Sign</a
        >
        <a href="{% url 's2v' %}"
          ><i class="fas fa-hand-sparkles"></i> Sign to Voice</a
        >
      </nav>
    </header>

    <main class="container">{% block content %} {% endblock %}</main>

    <footer>
      &copy; 2026 AI Sign Language Assistant • Empowering Accessibility
    </footer>
  </body>
</html>
